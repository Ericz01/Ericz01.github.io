<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Athena Aura Cosmetics - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="slideshow"></div>
    <div class="top-buttons">
        <div class="left-buttons">
            <button class="top-btn">Products</button>
            <button class="top-btn">Deals</button>
            <button class="top-btn">Contacts</button>
        </div>
        <div class="right-buttons">
            <button class="icon-btn"><img src="images/language-icon.png" alt="Language"></button>
            <button class="icon-btn"><img src="images/settings-icon.png" alt="Settings"></button>
            <button class="icon-btn"><img src="images/profile-icon.png" alt="Profile"></button>
        </div>
    </div>
    <div class="login-container">
        <img src="images/athena-logo.png" alt="Athena Logo" class="logo">
        <h1>Login</h1>
        <form>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="social-login">
            <div class="social-btn">
                <img src="images/google-icon.png" alt="Google" class="social-icon">
            </div>
            <div class="social-btn">
                <img src="images/facebook-icon.png" alt="Facebook" class="social-icon">
            </div>
        </div>
        <button class="create-account-btn">New to Athena Aura? Create an account</button>
    </div>
    <div class="fact-box left-fact-box"></div>
    <div class="fact-box right-fact-box"></div>
    <script src="js/script.js"></script>
</body>
</html>
